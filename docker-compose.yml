x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/suburbiq?schema=public
  NEXTAUTH_SECRET: local-docker-secret-change-me
  AUTH_SECRET: local-docker-secret-change-me
  APP_BASE_URL: http://localhost:3000
  STRIPE_SECRET_KEY: stub
  PAYPAL_CLIENT_ID: stub
  OPENAI_API_KEY: stub
  MAPBOX_ACCESS_TOKEN: stub
  REDIS_URL: redis://redis:6379
  S3_ENDPOINT: http://minio:9000
  S3_BUCKET: suburbiq-reports

services:
  migrate:
    build:
      context: .
      target: builder
    env_file:
      - path: .env.local
        required: false
    environment: *app-env
    command: sh -c "npm run db:deploy && npm run db:seed"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: false
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: suburbiq
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d suburbiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:

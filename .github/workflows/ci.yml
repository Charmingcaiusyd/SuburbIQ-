name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/suburbiq?schema=public
      NEXTAUTH_SECRET: ci-secret-change-me
      APP_BASE_URL: http://localhost:3000
      STRIPE_SECRET_KEY: stub
      PAYPAL_CLIENT_ID: stub
      OPENAI_API_KEY: stub
      MAPBOX_ACCESS_TOKEN: stub
      REDIS_URL: redis://localhost:6379
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: suburbiq-reports
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Acceptance matrix
        run: npm run test:acceptance
